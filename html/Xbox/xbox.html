<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>XBOX</title>
        <link
            rel="icon"
            type="image/x-icon"
            href="/images/images_Xbox/Xbox_one_logo.svg.png"
        />
        <link
            rel="stylesheet"
            type="text/css"
            media="screen"
            href="/css/xbox.css"
        />
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
        <script src="https://kit.fontawesome.com/de21f4bddc.js" crossorigin="anonymous"></script>
    </head>
    <body>
        <!-- ====== -->
        <!-- HEADER -->
        <!-- ====== -->
        <div class="header"></div>
        <script>
            $(function () {
                $(".header").load("/html/header.html");
            });
        </script>

        <div class="cuerpo">
            
            <!-- ! ======= ! -->
            <!-- ! PORTADA ! -->
            <!-- ! ======= ! -->
            <div class="fondo">
                <div class="oscuro"></div>
                <h1>Consolas Xbox</h1>
                <div class="consolas">
                    <div class="consola1">
                        <a
                            href="https://www.xbox.com/es-ES/consoles/xbox-series-s"
                        >
                            <img
                                src="../../images/images_Xbox/XboxSeriesS.png"
                                alt="Xbox series S"
                        /></a>
                        <h2>Xbox Series S</h2>
                    </div>
                    <div class="consola2">
                        <a
                            href="https://www.xbox.com/es-ES/consoles/xbox-series-x"
                        >
                            <img
                                src="../../images/images_Xbox/XboxSeriesX.png"
                                alt="Xbox Series X"
                        /></a>
                        <h2>Xbox Series X</h2>
                    </div>
                </div>
                <img src="../../images/images_Xbox/fondoXbox.png" />
            </div>
            
            <!-- ! ========= ! -->
            <!-- ! CARROUSEL ! -->
            <!-- ! ========= ! -->

            <div class="carousel"> 
                <div class="carousel-imagenes">
                    <div class="slide-image">
                        <img src="../../images/images_Xbox/Elden-Ring.jpg" alt="Elden Ring">
                    </div>
                    <div class="slide-image">
                        <img src="../../images/images_Xbox/gta v.jpg" alt="GTA 5">
                    </div>
                    <div class="slide-image">
                        <img src="../../images/images_Xbox/RDR2.jpg" alt="Red Dead Redemption 2">
                    </div>
                    <div class="slide-image">
                        <img src="../../images/images_Xbox/Forza-Horizon-5.jpg" alt="Forza Horizon 5">
                    </div>
                </div>
                <div class="backward controles">
                    <i class="fa-solid fa-backward"></i>
                </div>
                <div class="forward controles">
                    <i class="fa-solid fa-forward"></i>
                </div>
            </div>
            
            <!-- ! ======== ! -->
            <!-- ! TARJETAS ! -->
            <!-- ! ======== ! -->
            <h1>Juegos Xbox</h1>
            <div class="galeria">
                <div class="categoria">
                    <a href="">
                        <img
                            src="../../images/images_Xbox/gta v.jpg"
                            alt="Accion"
                        />
                        <h3>Acción</h3>
                    </a>
                </div>
                <div class="categoria">
                    <a href="">
                        <img
                            src="../../images/images_Xbox/cyberpunk.jpg"
                            alt="Accion"
                        />
                        <h3>Accion</h3>
                    </a>
                </div>
                <div class="categoria">
                    <a href="">
                        <img
                            src="../../images/images_Xbox/hogwarts legacy.jpg"
                            alt="Accion"
                        />
                        <h3>Accion</h3>
                    </a>
                </div>
                <div class="categoria">
                    <a href="">
                        <img src="../../images/images_Xbox/Elden-Ring.jpg" alt="Accion">
                        <h3>Accion</h3>
                    </a>
                </div>
            </div>

            <!-- ! ========== ! -->
            <!-- ! Accesorios ! -->
            <!-- ! ========== ! -->

            <h1>Accesorios</h1>
            <div class="accesorios">
                <div class="accesorio">
                    <div class="front">
                        <img src="../../images/images_Xbox/tarjeta.png" alt="Mando">
                    </div>
                    <div class="back">
                        <p>Texto de la parte posterior</p>
                    </div>
                </div>
                <div class="accesorio">
                    <div class="front">
                        <img src="../../images/images_Xbox/gamePass.png" alt="Game Pass">
                    </div>
                    <div class="back">
                        <p>Texto de la parte posterior</p>
                    </div>
                </div>
                <div class="accesorio">
                    <div class="front">
                        <img src="../../images/images_Xbox/tarjeta1.png" alt="Tarjetas">
                    </div>
                    <div class="back">
                        <p>Texto de la parte posterior</p>
                    </div>
                </div>
            </div>
            
            
        </div>
        <script src="../../js/xbox.js"></script>
    </body>
</html>
