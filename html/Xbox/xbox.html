    <body>
        <div class="header"></div>
        <script>
            $(function(){
                $(".header").load("/html/header.html");

        <div class="cuerpo">

            <!-- ! ======= ! -->
            <div class="fondo">
                <div class="oscuro"></div>
                <h1>Consolas Xbox</h1>
                <div class="consolas">
                    <div class="consola1"><a href="https://www.xbox.com/es-ES/consoles/xbox-series-s">
                        <img src="../../images/images_Xbox/XboxSeriesS.png" alt="Xbox series S"></a>
                        <h2>Xbox Series S</h2>
                    </div>
                    <div class="consola2">
                        <a href="https://www.xbox.com/es-ES/consoles/xbox-series-x">
                        <img src="../../images/images_Xbox/XboxSeriesX.png" alt="Xbox Series X"></a>
                        <h2>Xbox Series X</h2>
                    </div>
                </div>
                <img src="../../images/images_Xbox/fondoXbox.png">
            </div>
            
            <!-- ! ========= ! -->
            <!-- ! CARROUSEL ! -->
            <!-- ! ========= ! -->

            <div class="carousel"> 
                <div class="carousel-item"> 
                    <div class="slide-image">
                        <img src="../../images/images_Xbox/Elden-Ring.jpg" alt="Elden Ring">
                    </div>
                </div>
                <div class="carousel-item"> 
                    <div class="slide-image">
                        <img src="../../images/images_Xbox/gta v.jpg" alt="GTA 5">
                    </div>
                </div>
                <div class="carousel-item"> 
                    <div class="slide-image">
                        <img src="../../images/images_Xbox/RDR2.jpg" alt="Red Dead Redemption 2">
                    </div>
                </div>
                <div class="carousel-item"> 
                    <div class="slide-image">
                        <img src="../../images/images_Xbox/Forza-Horizon-5.jpg" alt="Forza Horizon 5">
                    </div>
                </div>
                <div class="backward controles">
                    <i class="fa-solid fa-backward"></i>
                </div>
                <div class="forward controles">
                    <i class="fa-solid fa-forward"></i>
                </div>
            </div>

                    <a href="">

                    <a href="">
