<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Contacto</title>
    <link rel="icon" type="image/x-icon" href="/images/Logo.jpg" />
    <link rel="stylesheet" type="text/css" media="screen" href="/css/contacto.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://kit.fontawesome.com/de21f4bddc.js" crossorigin="anonymous"></script>
    <script src="/js/header.js"></script>
</head>
<body>
    <div class="header"></div>

    <div class="cuerpo">
        <form action="contacto.html" method="get">
            <h1>Contáctanos</h1>
            <label for="name">Nombre:</label><br>
            <input type="text" id="name" name="name" required><br>
            <label for="name1">Apellido:</label><br>
            <input type="text" id="name1" name="name1" required><br>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required><br>
            <label for="message">Escribe un mensaje:</label><br>
            <textarea id="message" name="message" required></textarea><br>
            <input type="submit" value="Enviar">
            </div>
        </form>
    </div>
</body>
</html>
