<!DOCTYPE html>
<html>
    <head>
        <!-- *************** JQUERY *************** -->
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>

        <!-- *************** CHARSET *************** -->
        <meta charset="utf-8" />

        <!-- *************** VIEWPORT *************** -->
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- *************** TITULO Y LOGO *************** -->
        <title>Games2Play</title>
        <link rel="icon" type="image/x-icon" href="/images/Logo.jpg" />

        <!-- *************** CSS NINTENDO *************** -->
        <link rel="stylesheet" type="text/css" media="screen" href="/css/nintendo/nintendo.css" />

        <!-- *************** FONT AWESOME *************** -->

        <script src="/js/nintendo.js" defer></script>

        <!-- *************** JS COMÚN *************** -->
        <script src="/js/script_header.js"></script>
    </head>
    <body>
        <!-- ! ====== ! -->

        <!-- ! ====== ! -->
        <div class="header"></div>

        <!-- ! ====== ! -->

            <div class="tarjetas__container">

                    <img src="/images/images_nintendo/main/Sorpresa.png" alt="Bloque sorpresa" class="bloque" />
                    <div class="card" id="accion">
                        <i class="fa-solid fa-caret-up"></i>
                        <a class="page__link" href="/html/Nintendo/accion.html">
                            <img src="../../images/images_nintendo/accion/Metroid_Remastered.webp" alt="Metroid Remastered" />

                        </a>
                    </div>
                </div>

                <!-- ! ======== ! -->

                        <i class="fa-solid fa-caret-up"></i>
                        <a class="page__link" href="/html/Nintendo/aventura.html">
                            <img src="../../images/images_nintendo/accion/Zelda_TOTK.webp" alt="Legends Of Zelda: Tears Of Kingdom" />

                        </a>
                    </div>
                </div>

                <!-- ! ======= ! -->

                        <i class="fa-solid fa-caret-up"></i>
                        <a class="page__link" href="/html/Nintendo/deporte.html">

                        </a>
                    </div>
                </div>

                <!-- ! === ! -->

                    <img src="/images/images_nintendo/main/Sorpresa.png" alt="Bloque sorpresa" class="bloque" />
                    <div class="card" id="rpg">
                        <i class="fa-solid fa-caret-up"></i>
                        <a class="page__link" href="/html/Nintendo/rpg.html">
                            <img src="../../images/images_nintendo/rpg/Pokemon_Sol_Luna.webp" alt="Pokemon Sol y Luna" />

                        </a>
                    </div>
                </div>
            </div>

            <!-- ! ========== ! -->
            <!-- ! MARIO BROS ! -->
            <!-- ! ========== ! -->
            <div class="mario__container">
