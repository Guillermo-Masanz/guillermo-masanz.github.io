<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Nintendo</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="icon" type="image/x-icon" href="/images/images_nintendo/Nintendo_Logo.png" />
        <link rel="stylesheet" type="text/css" media="screen" href="../../css/nintendo.css" />
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
        <script src="/js/script_header.js"></script>
        <script src="https://kit.fontawesome.com/de21f4bddc.js" crossorigin="anonymous"></script>
        <script src="/js/nintendo.js" defer></script>
    </head>
    <body>
        <!-- ! ====== ! -->
        <!-- ! HEADER ! -->
        <!-- ! ====== ! -->
        <div class="header"></div>

        <!-- ! ====== ! -->
        <!-- ! CUERPO ! -->
        <!-- ! ====== ! -->
        <div class="cuerpo">
            <!-- ! ========== ! -->
            <!-- ! BACKGROUND ! -->
            <!-- ! ========== ! -->
            <img src="/images/images_nintendo/main/Mario_Bros_Background_V2.jpeg" alt="Mario Bros Background" />

            <!-- ! ========== ! -->
            <!-- ! MARIO BROS ! -->
            <!-- ! ========== ! -->
            <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank">
                <img src="/images/images_nintendo/main/Mario_Bros.png" alt="Mario Bros" class="mario_bros" />
            </a>

            <!-- ! ====== ! -->
            <!-- ! ACCION ! -->
            <!-- ! ====== ! -->
            <div class="bloques_container">
                <div class="columna_container">
                    <div class="card" id="accion">
                        <img src="../../images/images_nintendo/accion/Metroid_Remastered.png" alt="Metroid Remastered" />
                        <a href="/html/Nintendo/accion.html">Accion</a>
                        <i class="fa-solid fa-caret-down"></i>
                    </div>
                    <img src="/images/images_nintendo/main/Sorpresa.png" alt="Bloque sorpresa" id="bloque" />
                </div>

                <!-- ! ======== ! -->
                <!-- ! AVENTURA ! -->
                <!-- ! ======== ! -->
                <div class="columna_container">
                    <div class="card" id="aventura">
                        <img src="../../images/images_nintendo/aventura/Zelda_TOTK.jpg" alt="Legends Of Zelda: Tears Of Kingdom" />
                        <a href="/html/Nintendo/aventura.html">Aventura</a>
                        <i class="fa-solid fa-caret-down"></i>
                    </div>
                    <img src="/images/images_nintendo/main/Sorpresa.png" alt="Bloque sorpresa" id="bloque" />
                </div>

                <!-- ! ======= ! -->
                <!-- ! DEPORTE ! -->
                <!-- ! ======= ! -->
                <div class="columna_container">
                    <div class="card" id="deporte">
                        <img src="../../images/images_nintendo/deporte/Nintendo_Switch_Sports.jpg" alt="Nintendo Switch Sports" />
                        <a href="/html/Nintendo/deporte.html">Deporte</a>
                        <i class="fa-solid fa-caret-down"></i>
                    </div>
                    <img src="/images/images_nintendo/main/Sorpresa.png" alt="Bloque sorpresa" id="bloque" />
                </div>

                <!-- ! === ! -->
                <!-- ! RPG ! -->
                <!-- ! === ! -->
                <div class="columna_container">
                    <div class="card" id="rpg">
                        <img src="../../images/images_nintendo/rpg/Pokemon_Sol_Luna.webp" alt="Pokemon Sol y Luna" />
                        <a href="/html/Nintendo/rpg.html">RPG</a>
                        <i class="fa-solid fa-caret-down"></i>
                    </div>
                    <img src="/images/images_nintendo/main/Sorpresa.png" alt="Bloque sorpresa" id="bloque" />
                </div>
            </div>
        </div>

        <!-- ! ====== ! -->
        <!-- ! FOOTER ! -->
        <!-- ! ====== ! -->
        <div class="footer"></div>
    </body>
</html>
