<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8" />
        <title>Games2Play</title>
        <link rel="stylesheet" type="text/css" media="screen" href="css/main.css" />
        <link rel="icon" type="image/x-icon" href="images/Logo.jpg" />
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
        <script src="js/main.js" defer></script>
        <script src="js/header.js"></script>
    </head>
    <body>
        <!-- ! ====== ! -->
        <!-- ! HEADER ! -->
        <!-- ! ====== ! -->
        <div class="header"></div>

        <!-- ! ==== ! -->
        <!-- ! BODY ! -->
        <!-- ! ==== ! -->
        <div class="cuerpo">
            <div class="consolas">
                
                <!-- ! ==================== ! -->
                <!-- ! SELECTOR DE CONSOLAS ! -->
                <!-- ! ==================== ! -->
                <div class="selector_consolas">
                    <ul>
                        <li>
                            <p class="xbox_button boton">Xbox</p>
                        </li>
                        <li>
                            <p class="ps_button boton">PlayStation</p>
                        </li>
                        <li>
                            <p class="nintendo_button boton">Nintendo</p>
                        </li>
                    </ul>
                </div>

                <!-- ! ================== ! -->
                <!-- ! VIDEOS DE CONSOLAS ! -->
                <!-- ! ================== ! -->
                <div class="consola active" id="xbox">
                    <video src="videos/SeriesX_Trailer.mp4" autoplay muted loop></video>
                    <div class="goto">
                        <a href="html/Xbox/xbox.html">Ir a XBOX</a>
                    </div>
                </div>

                <div class="consola" id="ps">
                    <video src="videos/PS5_Trailer.mp4" autoplay muted loop></video>
                    <div class="goto">
                        <a href="html/PS/ps-principal.html">Ir a PlayStation</a>
                    </div>
                </div>

                <div class="consola" id="nintendo">
                    <video src="videos/Nintendo-Switch_Trailer.mp4" autoplay muted loop></video>
                    <div class="goto">
                        <a href="html/Nintendo/nintendo.html">Ir a Nintendo</a>
                    </div>
                </div>
                
            </div>
        </div>
